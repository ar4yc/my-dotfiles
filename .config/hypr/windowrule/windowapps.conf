# ▄▀█ █▀█ █▀█ █▔▔
# █▀█ █▀▀ █▀▀ ▂▂█

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.4, match:namespace waybar
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0.4, match:namespace swaync-control-center
layerrule = blur on, match:namespace wofi
layerrule = ignore_alpha 0.4, match:namespace wofi

# Volume Control
windowrule {
   name = pulseaudio
   match:class = org.pulseaudio.pavucontrol
   float = yes
   size = 653 410
   move = ((monitor_w-668)-10) monitor_h*0+35
   pin = no
}

# Bluetooth manager
windowrule {
   name = Overskride
   match:class = io.github.kaii_lb.Overskride
   float = yes
   center = yes
   size = 920 810
}

# Wifi menu
windowrule {
   name = nm-applet
   match:class = nm-connection-editor
   float = yes
   size = 398 388
   move = ((monitor_w-398)-100) monitor_h*0+35
   pin = yes
}

# cava
windowrule {
   name = cava
   match:class = cava
   float = yes
   center = yes
   size = 780 410
}

windowrule {
   name = mpv
   match:class = mpv
   float = yes
   center = yes
   no_blur = yes
   opacity = 1.2
   keep_aspect_ratio = yes
}

windowrule {
   name = qView
   match:class = com.interversehq.qView
   float = yes
   center = yes
   size = monitor_w*0.5 monitor_h*0.6
   min_size = 200 200
   max_size = monitor_w*0.9 monitor_h*0.9
   opaque = yes
}

windowrule {
   name = waypaper
   match:class = waypaper
   float = yes
   center = yes
   size = 1347 768
}

windowrule {
   name = Dialect
   match:class = app.drey.Dialect
   float = yes
   center = yes
   size = 814 320
}

windowrule {
   name = localsend
   match:class = localsend
   float = yes
   center = yes
   size = 890 500
}

windowrule {
   name = Waydroid
   match:class = Waydroid
   opaque = yes
}

windowrule {
   name = Upscayl
   match:class = Upscayl
   float = yes
   center = yes
   size = 1161 715
}

windowrule {
   name = mousam
   match:class = io.github.amit9838.mousam
   float = yes
   center = yes
   size = 1065 650
}

windowrule {
   name = easyeffects
   match:class = com.github.wwmm.easyeffects
   min_size = 1100 680
}

windowrule {
   name = MissionCenter
   match:class = io.missioncenter.MissionCenter
   float = yes
   center = yes
   size = 1045 553
}

windowrule {
   name = songrec
   match:class = .*songrec.*
   float = yes
   center = yes
   size = 900 605
}

windowrule {
   name = obs
   match:class = com.obsproject.Studio
   match:initial_title = .*OBS.*
   min_size = 1444 745
}

windowrule {
   name = kitty
   match:class = kitty
   opacity = 1
   no_blur = yes
}

windowrule {
   name = vesktop-visual
   match:class = vesktop
   opacity = 0.962
   #no_blur = yes
}

windowrule {
   name = youtube_music
   match:class = com.github.th_ch.youtube_music
   opacity = 0.883
   min_size = 424 704
}

windowrule {
   name = code
   match:class = code|codium
   opacity = 1.051
}

windowrule {
   name = noscreenshare
   match:class = obsidian|Element|io.github.tdesktop_x64.TDesktop|vmware|zen|vesktop
#  no_screen_share = yes
}

#Zen History
windowrule {
   name = zen-history
   match:class = zen
   match:initial_title = .*(Библиотека|History|Library).*
   float = yes
   center = yes
   opaque = yes
   persistent_size = yes
 }

# Picture-in-Picture
windowrule {
   name = PiP
   match:title = (?i).*(Картинка в картинке|Picture in Picture).*
   float = yes
   size = 587 330
   pin = yes
   opaque = yes
   keep_aspect_ratio = yes
   border_size = 0
   no_initial_focus = yes
 }

windowrule {
   name = discord-pip
   match:class = vesktop|discord
   match:initial_title = Discord Popout
   float = yes
   pin = yes
   size = 320 211
   move = monitor_w*0.001 monitor_h*0.25
   opacity = 0.6
   no_blur = yes
 #  no_focus = yes
}

windowrule {
   name = telegram-call
   match:class = telegram|io.github.tdesktop_x64.TDesktop
   match:title = negative:.*64Gram.*
   match:initial_title = negative:.*64Gram.*
   float = yes
   center = yes
   size = monitor_w*0.35 monitor_h*0.53
}

windowrule {
   name = telegram-media
   match:class = telegram|io.github.tdesktop_x64.TDesktop
   match:initial_title = .*(Просмотр медиа|Media).*
   float = yes
   center = yes
   size = monitor_w*0.85 monitor_h*0.85
}

windowrule {
   name = vmware
   match:class = Vmware
   opaque = yes
   no_blur = yes
}

windowrule {
   name = portal
   match:class = xdg-desktop-portal-gtk
   float = yes
   center = yes
   size = window_w window_h
   persistent_size = yes
}

windowrule {
   name = hyprland-share
   match:class = hyprland-share-picker
   float = yes
   size = 500 290
   center = yes
}

windowrule {
   name = gsr ui
   match:title = gsr ui
   opacity = 1.1
   rounding = 0
   border_size = 0
   no_blur = yes
}

windowrule {
   name = kdenlive
   match:class = org.kde.kdenlive
   match:title = Kdenlive
   float = yes
   center = yes
   size = window_w window_h
   max_size = 2548 1040
   rounding = 3
   opaque = yes
   border_size = 0
   tag = welcome
}

windowrule {
   name = kdenlive-settings
   match:class = org.kde.kdenlive
   match:title = .*Configure.*
   float = yes
   center = yes
   size = 1274 816
   opaque = yes
}

windowrule {
   name = kdenlive-splash
   match:class = org.kde.kdenlive
   match:title = .*Splash Screen.*
   float = yes
   center = yes
   size = window_w window_h
   opaque = yes
}

windowrule {
   name = PrismLauncher_download
   match:class = org.prismlauncher.PrismLauncher
   match:title = (?i).*(Загрузить|Download).*
   float = yes
   center = yes
   size = 1037 734
}

windowrule {
   name = PrismLauncher_console
   match:class = org\.prismlauncher\.PrismLauncher
   match:title = (?i).*(консоли|Console).*
   float = yes
   center = yes
   size = 1224 912
}